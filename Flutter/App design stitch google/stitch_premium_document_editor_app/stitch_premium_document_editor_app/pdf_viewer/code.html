<style>
        body {

        }

            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;

        }

        }

            background: #c1c8c9;
            border-radius: 10px;
        }
        .scrub-slider {
            -webkit-appearance: none;
            appearance: none;
            background: transparent;
            cursor: pointer;
        }

            background: #d0e7ea;
            height: 4px;
            border-radius: 2px;
        }

            -webkit-appearance: none;
            appearance: none;
            margin-top: -6px;
            background-color: #ba1a1a;
            height: 16px;
            width: 16px;

</button>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-error truncate max-w-[180px] md:max-w-md">Q3 Financial Report</h1>
</div>

<button aria-label="Search" class="hover:bg-error-container/20 transition-colors p-2 rounded-full active:scale-95 duration-100">

<!-- PDF Canvas Area -->

</button>

<span class="material-symbols-outlined text-secondary">sticky_note_2</span>
</button>
</div>
<!-- Floating Action Button (Primary Tool - PDF Specific) -->
<!-- Suppressed based on "Contextual FAB Suppression" rule for Detail screens, 
         but technically a "Tool" in a PDF viewer might be wanted. 
         Choosing to render a "Done/Save" FAB if editing or a "Share" for view mode. -->
<button class="fixed bottom-28 right-6 w-14 h-14 bg-error text-on-error rounded-full shadow-[0_6px_15px_rgba(186,26,26,0.3)] flex items-center justify-center hover:scale-105 active:scale-95 transition-all z-40">
<span class="material-symbols-outlined text-[32px]">share</span>
</button>
<script>
        // Simple Interaction logic for PDF scrubber
        const slider = document.querySelector('.scrub-slider');
        const pageIndicator = document.querySelector('.font-headline-sm');
        
        slider.addEventListener('input', (e) => {
            const val = e.target.value;
            pageIndicator.innerHTML = `${val} <span class="text-outline font-normal text-body-md">of 12</span>`;
            
            // Logic to scroll to page would go here
            // const targetPage = document.querySelectorAll('.pdf-page-shadow')[val-1];
            // targetPage.scrollIntoView({ behavior: 'smooth' });
        });

        // Atmospheric Micro-interaction: Fade toolbars on scroll
        const pdfContainer = document.getElementById('pdf-container');
        const header = document.querySelector('header');
        const bottomNav = document.querySelector('.fixed.bottom-8');
        let lastScrollY = 0;

        pdfContainer.addEventListener('scroll', () => {
            const currentScrollY = pdfContainer.scrollTop;
            
            if (currentScrollY > lastScrollY && currentScrollY > 100) {
                // Scrolling down - hide toolbars slightly for focus
                header.classList.add('-translate-y-4', 'opacity-90');
                bottomNav.classList.add('translate-y-4', 'opacity-50');
            } else {
                // Scrolling up - show toolbars
                header.classList.remove('-translate-y-4', 'opacity-90');
                bottomNav.classList.remove('translate-y-4', 'opacity-50');
            }
            lastScrollY = currentScrollY;
        });
    </script>

<!-- Hidden Logic for Interactions -->
<script>
        // Micro-interaction for filter buttons
        document.querySelectorAll('.flex-shrink-0.flex-col.items-center').forEach(btn => {
            btn.addEventListener('click', function() {
                // Clear existing active states
                document.querySelectorAll('.flex-shrink-0.flex-col.items-center div').forEach(div => {
                    div.classList.remove('border-secondary', 'bg-surface-container-high');
                    div.classList.add('border-transparent', 'bg-white');
                });
                document.querySelectorAll('.flex-shrink-0.flex-col.items-center span').forEach(span => {
                    span.classList.remove('font-bold', 'text-secondary');
                    span.classList.add('text-on-surface-variant');
                });

                // Set new active state
                const thumbnail = this.querySelector('div');
                const label = this.querySelector('span');
                thumbnail.classList.add('border-secondary', 'bg-surface-container-high');
                thumbnail.classList.remove('border-transparent', 'bg-white');
                label.classList.add('font-bold', 'text-secondary');
                label.classList.remove('text-on-surface-variant');
            });
        });

        // Format selection chips toggle
        const formatChips = document.querySelectorAll('.flex.gap-2 button');
        formatChips.forEach(chip => {
            chip.addEventListener('click', function() {
                formatChips.forEach(c => {
                    c.classList.remove('bg-secondary', 'text-white', 'shadow-md');
                    c.classList.add('bg-white', 'text-on-surface-variant', 'border-outline-variant');
                });
                this.classList.add('bg-secondary', 'text-white', 'shadow-md');
                this.classList.remove('bg-white', 'text-on-surface-variant', 'border-outline-variant');
            });
        });
    </script>

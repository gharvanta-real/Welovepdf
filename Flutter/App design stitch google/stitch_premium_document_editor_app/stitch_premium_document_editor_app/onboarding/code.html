<!-- Contextual micro-interaction script -->
<script>
        // Simple parallax effect for floating icons
        document.addEventListener('mousemove', (e) => {
            const icons = document.querySelectorAll('.glass-card');
            const x = e.clientX / window.innerWidth;
            const y = e.clientY / window.innerHeight;
            
            icons.forEach((icon, index) => {
                const speed = (index + 1) * 10;
                const moveX = (x - 0.5) * speed;
                const moveY = (y - 0.5) * speed;
                icon.style.transform = `translate(${moveX}px, ${moveY}px)`;
            });
        });

        // Suppression of FAB and Navigation Shell is implicit by omission 
        // as per instructions for Transactional/Onboarding screens.
    </script>

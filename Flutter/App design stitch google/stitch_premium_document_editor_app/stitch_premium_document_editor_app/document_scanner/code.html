<style>
        body {
            font-family: 'Hanken+Grotesk', sans-serif;
            background-color: #001f2a; /* Deep Slate Teal for camera background */
            overflow: hidden;
            height: 100vh;
            margin: 0;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
            transition: all 0.2s ease;
        }

        /* Blue glowing edge detection animation */
        @keyframes edge-glow {
            0% { opacity: 0.4; transform: scale(0.995); }
            50% { opacity: 1; transform: scale(1.005); }
            100% { opacity: 0.4; transform: scale(0.995); }
        }

        .document-overlay {
            border: 2px solid #ceedfd;
            box-shadow: 0 0 25px rgba(206, 237, 253, 0.6), inset 0 0 25px rgba(206, 237, 253, 0.4);
            animation: edge-glow 2s infinite ease-in-out;
            pointer-events: none;
        }

        /* Glassmorphism for UI elements */
        .glass-ui {
            background: rgba(0, 31, 42, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .camera-shutter-active:active {
            transform: scale(0.9);
            background-color: #4d6265;
        }

        /* Hide scrollbars */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>

<!-- Interactive Layer -->
<script>
        const shutter = document.getElementById('shutter');
        const overlay = document.querySelector('.document-overlay');

        shutter.addEventListener('click', () => {
            // Flash Effect
            const flash = document.createElement('div');
            flash.className = 'fixed inset-0 bg-white z-[100] transition-opacity duration-300 pointer-events-none';
            document.body.appendChild(flash);
            
            setTimeout(() => {
                flash.style.opacity = '0';
                setTimeout(() => flash.remove(), 300);
            }, 50);

            // Shutter feedback
            shutter.classList.add('scale-90');
            setTimeout(() => shutter.classList.remove('scale-90'), 100);
            
            // Temporary glow intensify
            overlay.style.boxShadow = '0 0 50px rgba(255, 255, 255, 0.9)';
            setTimeout(() => {
                overlay.style.boxShadow = '';
            }, 500);
        });

        // Mode Switching Micro-interaction
        const modeButtons = document.querySelectorAll('.no-scrollbar button');
        modeButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                modeButtons.forEach(b => {
                    b.className = "whitespace-nowrap font-label-md text-label-md text-outline-variant hover:text-white transition-colors";
                });
                btn.className = "whitespace-nowrap font-label-md text-label-md text-on-error font-bold border-b-2 border-on-error pb-1";
            });
        });
    </script>

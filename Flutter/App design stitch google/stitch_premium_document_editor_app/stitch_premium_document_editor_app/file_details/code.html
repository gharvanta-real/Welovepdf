<script>
        // Simple micro-interaction for the bottom sheet
        document.addEventListener('DOMContentLoaded', () => {
            const sheet = document.querySelector('.fixed.bottom-0.max-w-2xl');
            // Initial animation in
            sheet.style.transform = 'translateY(100%)';
            setTimeout(() => {
                sheet.style.transform = 'translateY(0)';
            }, 100);

            // Optional: Close interaction
            const overlay = document.querySelector('.bg-primary\\/20');
            overlay.addEventListener('click', () => {
                sheet.style.transform = 'translateY(100%)';
                setTimeout(() => {
                    overlay.style.opacity = '0';
                    setTimeout(() => window.history.back(), 300);
                }, 300);
            });
        });
    </script>

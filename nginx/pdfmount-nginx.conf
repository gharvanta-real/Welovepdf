# Suggested Nginx Configuration with Security Headers for PDFMount Static Frontend

server {
    listen 80;
    listen [::]:80;
    server_name pdfmount.online www.pdfmount.online;
    return 301 https://pdfmount.online$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.pdfmount.online;
    
    ssl_certificate /etc/letsencrypt/live/pdfmount.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pdfmount.online/privkey.pem;
    
    return 301 https://pdfmount.online$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name pdfmount.online;

    ssl_certificate /etc/letsencrypt/live/pdfmount.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pdfmount.online/privkey.pem;

    root /opt/pdfmount/dist;
    index index.html;

    # Increase header buffer size to support large base64 signature/overlay headers
    large_client_header_buffers 4 256k;

    # Priority 5: Security Headers for Static Frontend (CSP, HSTS, X-Frame-Options, X-Content-Type, Referrer Policy)
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.googletagmanager.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://www.google-analytics.com https://*.google-analytics.com https://*.analytics.google.com https://*.googletagmanager.com https://efnxvidjqqvbbgcopjls.supabase.co wss://efnxvidjqqvbbgcopjls.supabase.co; img-src 'self' data: https://www.google-analytics.com https://*.google-analytics.com https://www.googletagmanager.com; frame-ancestors 'none';" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;

    # Static Files mapping for Single Page App (SPA) with SSG pre-rendered pages.
    # Priority: exact file → pre-rendered /route/index.html → SPA fallback root index.html
    location / {
        try_files $uri $uri/index.html $uri/ /index.html;
    }

    # API Proxy to Rust Backend listening on local port 8081
    location ~ ^/(api|health|engine|tools|capabilities|jobs|inspect|upload|download)(/|$) {
        proxy_pass http://127.0.0.1:8081;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Disable buffering for uploading large PDF files
        proxy_request_buffering off;
        proxy_buffering off;
        
        # Max request size (500 MB to match Pro plan upload limits)
        client_max_body_size 500M;
    }
}


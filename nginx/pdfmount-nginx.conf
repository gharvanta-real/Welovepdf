# Suggested Nginx Configuration with Security Headers for PDFMount Static Frontend

server {
    listen 80;
    listen [::]:80;
    server_name gharvanta.in www.gharvanta.in;
    return 301 https://gharvanta.in$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.gharvanta.in;
    
    ssl_certificate /etc/letsencrypt/live/gharvanta.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gharvanta.in/privkey.pem;
    
    return 301 https://gharvanta.in$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name gharvanta.in;

    ssl_certificate /etc/letsencrypt/live/gharvanta.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gharvanta.in/privkey.pem;

    root /opt/pdfmount/dist;
    index index.html;

    # Priority 5: Security Headers for Static Frontend (CSP, HSTS, X-Frame-Options, X-Content-Type, Referrer Policy)
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://efnxvidjqqvbbgcopjls.supabase.co wss://efnxvidjqqvbbgcopjls.supabase.co; img-src 'self' data:; frame-ancestors 'none';" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;

    # Static Files mapping for Single Page App (SPA) fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API Proxy to Rust Backend listening on local port 8081
    location ~ ^/(api|health|engine|tools|capabilities|jobs|inspect|upload|download)/ {
        proxy_pass http://127.0.0.1:8081;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Disable buffering for uploading large PDF files
        proxy_request_buffering off;
        proxy_buffering off;
        
        # Max request size (500 MB to match Pro plan upload limits)
        client_max_body_size 500M;
    }
}

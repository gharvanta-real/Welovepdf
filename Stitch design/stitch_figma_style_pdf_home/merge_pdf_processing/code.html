<div class="flex justify-between items-center h-20 px-margin-page max-w-7xl mx-auto">
<div class="font-headline text-headline font-bold text-primary dark:text-inverse-on-surface">

<div class="hidden md:flex items-center space-x-8">

<!-- Main Content Canvas -->

<!-- Background Asset Integration -->
<div class="absolute inset-0 opacity-10 pointer-events-none">
<img alt="Processing Background Image" class="w-full h-full object-cover grayscale" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDsLecTLzvyomHCX_Nv93ffloJ5-moppH-oCp5yaJHubcsHzuRrgwabc63aZfk6N6NoSvrwKIaT7HXeyvZQS25--RbX0u-MPFJWyUFbBA760HoOsDvq6c5cp8ZbZaW57fCngowcDSfwF8_2B5q2n7rycnyJHspnNTO9nz0YLKB591QA_KZCPdbnBlvsgOZ2CvVyqnWiKJ1rmWqxibyq96jdsaTSiot5sLNED429uyI1sSXPTdmeWFkNT9vdqMjFJShXEb2uobdZlok"/>
</div>
<!-- Center Processing Modal/Section -->
<div class="relative z-10 max-w-2xl w-full text-center fade-in">
<!-- Minimal Circular Loading Indicator -->
<div class="flex justify-center mb-padding-lg">
<div class="relative w-32 h-32 flex items-center justify-center">
<!-- Stationary background track -->
<div class="absolute inset-0 rounded-full border-[3px] border-hairline"></div>
<!-- Animated ring -->
<div class="absolute inset-0 rounded-full border-[3px] border-transparent border-t-block-lilac loader-ring"></div>
<!-- Central Icon -->
<span class="material-symbols-outlined text-4xl text-on-surface-variant">sync</span>
</div>
</div>
<!-- Typography Container -->
<div class="space-y-4">
<h1 class="font-display-xl-mobile md:font-display-xl text-display-xl-mobile md:text-display-xl text-primary tight-tracking">
                    Processing your request
                </h1>
<p class="font-body-lg text-body-lg text-on-surface-variant max-w-md mx-auto">
                    Uploading files to secure workspace...
                </p>
</div>
<!-- Percentage Counter (Simulated Interaction) -->
<div class="mt-8 font-eyebrow text-eyebrow text-on-surface-variant opacity-60">
<span id="progress-val">42</span>% Complete
            </div>
</div>
<!-- Floating Status Pill (Bottom Right) -->
<div class="fixed bottom-gutter right-gutter z-50">
<div class="flex items-center space-x-3 bg-primary text-on-primary px-6 py-4 rounded-full shadow-lg fade-in" style="animation-delay: 0.2s;">
<div class="w-2 h-2 rounded-full bg-block-mint animate-pulse"></div>
<span class="font-button text-[14px] uppercase tracking-wider font-bold">
                    Uploading and processing Merge PDF...
                </span>
</div>
</div>
</main>
<!-- Footer Shell (Minified for Processing State) -->
<footer class="w-full bg-primary dark:bg-surface-container-lowest py-padding-lg px-margin-page">
<div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center opacity-60">
<div class="font-headline text-headline text-on-primary dark:text-on-surface mb-4 md:mb-0">
                PDF.Edit
            </div>
<div class="font-body text-body text-on-primary-container dark:text-on-surface-variant">
                © 2024 PDF.Edit Inc. All rights reserved.
            </div>
</div>
</footer>
<!-- Micro-interaction Script -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const progressSpan = document.getElementById('progress-val');
            let progress = 42;
            
            const interval = setInterval(() => {
                if (progress < 98) {
                    progress += Math.floor(Math.random() * 5);
                    if (progress > 98) progress = 98;
                    progressSpan.innerText = progress;
                } else {
                    clearInterval(interval);
                }
            }, 1200);
        });
    </script>
